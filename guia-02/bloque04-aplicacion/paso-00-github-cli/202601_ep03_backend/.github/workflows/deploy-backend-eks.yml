name: CI/CD Backend — Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  ECR_REPO_BACKEND: tienda-backend

# ============================================================
# ETAPA 1 — Build: construye y publica la imagen Docker en ECR
# ============================================================
jobs:
  build:
    name: "Etapa 1 — Build y Push a ECR"
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.export.outputs.IMAGE_TAG }}
      ECR_REGISTRY: ${{ steps.export.outputs.ECR_REGISTRY }}

    steps:
      - name: Checkout codigo Backend
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Deducir variables de EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          CLUSTER=$(aws eks list-clusters --region "$AWS_REGION" --query 'clusters[0]' --output text)
          if [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ]; then
            echo "ERROR: No se encontro ningun cluster EKS en la region $AWS_REGION"
            exit 1
          fi
          echo "EKS_CLUSTER_NAME=$CLUSTER" >> $GITHUB_ENV
          echo "  Cluster detectado: $CLUSTER"

          NAMESPACE=$(grep -m1 '^  name:' k8s/namespace.yaml | awk '{print $2}')
          if [ -z "$NAMESPACE" ]; then
            echo "ERROR: No se pudo extraer el namespace de k8s/namespace.yaml"
            exit 1
          fi
          echo "EKS_NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "  Namespace detectado: $NAMESPACE"

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag y exportar outputs
        id: export
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "  Tag: $IMAGE_TAG"
          echo "  ECR: $ECR_REGISTRY"

      - name: Build imagen Docker
        env:
          ECR_REGISTRY: ${{ steps.export.outputs.ECR_REGISTRY }}
        run: |
          echo "  Construyendo imagen..."
          docker build \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest \
            .
          echo "  ✔ Build completado"

      - name: Push a ECR
        env:
          ECR_REGISTRY: ${{ steps.export.outputs.ECR_REGISTRY }}
        run: |
          echo "  Publicando en ECR..."
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest
          echo "  ✔ Push completado"
          echo "  Imagen: $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}"

# ============================================================
# ETAPA 2 — Deploy: despliega la nueva imagen en EKS
# ============================================================
  deploy:
    name: "Etapa 2 — Deploy a EKS"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo Backend (manifests k8s)
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR (deploy)
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deducir variables de EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          CLUSTER=$(aws eks list-clusters --region "$AWS_REGION" --query 'clusters[0]' --output text)
          echo "EKS_CLUSTER_NAME=$CLUSTER" >> $GITHUB_ENV
          echo "  Cluster: $CLUSTER"

          NAMESPACE=$(grep -m1 '^  name:' k8s/namespace.yaml | awk '{print $2}')
          echo "EKS_NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "  Namespace: $NAMESPACE"

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          echo "  Contexto: $(kubectl config current-context)"

      - name: Aplicar manifests k8s de Backend
        run: |
          echo "  Aplicando namespace..."
          kubectl apply -f k8s/namespace.yaml

          echo "  Aplicando backend-deployment..."
          kubectl apply -f k8s/backend-deployment.yaml -n $EKS_NAMESPACE

          echo "  Aplicando backend-service..."
          kubectl apply -f k8s/backend-service.yaml -n $EKS_NAMESPACE

          echo "  ✔ Manifests aplicados"

      - name: Actualizar imagen del deployment
        env:
          IMAGE_TAG: ${{ needs.build.outputs.IMAGE_TAG }}
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
        run: |
          echo "  Actualizando deployment/tienda-backend..."
          kubectl set image deployment/tienda-backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE

          echo "  Esperando a que los pods arranquen (60s)..."
          sleep 60

          echo "  Verificando estado de los pods..."
          kubectl get pods -n $EKS_NAMESPACE -l app=tienda-backend
          echo ""

          for POD_NAME in $(kubectl get pods -n $EKS_NAMESPACE -l app=tienda-backend -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- Describe del pod $POD_NAME ---"
            kubectl describe pod "$POD_NAME" -n $EKS_NAMESPACE | tail -n 15
            echo ""
            echo "--- Logs del pod $POD_NAME (últimas 15 líneas) ---"
            kubectl logs "$POD_NAME" -n $EKS_NAMESPACE --tail=15 2>/dev/null || echo "  (logs no disponibles aún)"
            echo ""
          done

      - name: Verificar estado final
        run: |
          echo ""
          echo "========================================="
          echo " ESTADO FINAL DEL DEPLOYMENT"
          echo "========================================="
          echo ""
          echo "--- Pods ---"
          kubectl get pods -n $EKS_NAMESPACE -l app=tienda-backend
          echo ""
          echo "--- Services ---"
          kubectl get svc -n $EKS_NAMESPACE -l app=tienda-backend
          echo ""
          echo "--- Deployment ---"
          kubectl rollout status deployment/tienda-backend -n $EKS_NAMESPACE --timeout=10s 2>/dev/null || echo "  (aún en progreso — normal en nodo pequeño)"
