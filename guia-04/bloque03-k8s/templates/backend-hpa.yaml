apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${NAMESPACE}-backend-hpa
  namespace: ${NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${NAMESPACE}-backend
  minReplicas: ${BACKEND_HPA_MIN}
  maxReplicas: ${BACKEND_HPA_MAX}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ${BACKEND_HPA_CPU}