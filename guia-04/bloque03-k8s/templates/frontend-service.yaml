apiVersion: v1
kind: Service
metadata:
  name: ${NAMESPACE}-frontend
  namespace: ${NAMESPACE}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: ${NAMESPACE}-frontend
  ports:
    - port: ${FRONTEND_PORT}
      targetPort: ${FRONTEND_PORT}