apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${NAMESPACE}-frontend-hpa
  namespace: ${NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${NAMESPACE}-frontend
  minReplicas: ${FRONTEND_HPA_MIN}
  maxReplicas: ${FRONTEND_HPA_MAX}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ${FRONTEND_HPA_CPU}