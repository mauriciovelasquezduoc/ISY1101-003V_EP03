# repositorios.yaml - Configuración de repositorios ECR
# Nombres de los repositorios a crear

REPOSITORIES:
  - Name: ep03-database
    Description: Repositorio para imagen de base de datos
    ImageTagMutability: MUTABLE
    ScanOnPush: false

  - Name: ep03-backend
    Description: Repositorio para imagen de backend Spring Boot
    ImageTagMutability: MUTABLE
    ScanOnPush: false

  - Name: ep03-frontend
    Description: Repositorio para imagen de frontend Nginx
    ImageTagMutability: MUTABLE
    ScanOnPush: false