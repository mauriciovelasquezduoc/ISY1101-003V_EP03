name: ep03

services:

  app-db:
    image: ep03_app_db
    build:
      context: ./app-db
      dockerfile: Dockerfile
    container_name: ep03_app_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: duoc_db
      MYSQL_USER: duoc_user
      MYSQL_PASSWORD: duoc_pass
    volumes:
      - ep03_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "duoc_user", "-pduoc_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app-alumnos:
    image: ep03_app_alumnos
    build:
      context: ./app-alumnos
      dockerfile: Dockerfile
    container_name: ep03_app_alumnos
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://app-db:3306/duoc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "duoc_user"
      SPRING_DATASOURCE_PASSWORD: "duoc_pass"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      app-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/alumnos"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web-alumnos:
    image: ep03_web_alumnos
    build:
      context: ./web-alumnos
      dockerfile: Dockerfile
    container_name: ep03_web_alumnos
    ports:
      - "80:80"
    depends_on:
      app-alumnos:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ep03_mysql_data:
    name: ep03_mysql_data
