name: CI/CD Frontend — Gestor de Alumnos EKS
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: alumnos-frontend
  K8S_NAMESPACE: alumnos
  DEPLOYMENT_NAME: alumnos-frontend
permissions:
  contents: write
jobs:
  # ============================================================
  # JOB 1: VERSIONING — calcula v1.x.0 y crea tag git
  # ============================================================
  versioning:
    name: Versionado Semántico (v1.x.0)
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW
  # ============================================================
  # JOB 2: BUILD & PUSH ECR — construye y publica la imagen
  # ============================================================
  build-push-ecr:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build y push con cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
      - name: Resumen build
        run: |
          echo "### Imagen publicada en ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ steps.login-ecr.outputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Repositorio:** \`${{ env.ECR_REPO_FRONTEND }}\`" >> $GITHUB_STEP_SUMMARY
  # ============================================================
  # JOB 3: DEPLOY A EKS — aplica manifiestos y actualiza imagen
  # ============================================================
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    needs: [versioning, build-push-ecr]
    steps:
      - uses: actions/checkout@v4
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2
      - name: Deducir variables de EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          CLUSTER=$(aws eks list-clusters --region "$AWS_REGION" --query 'clusters[0]' --output text)
          if [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ]; then
            echo "ERROR: No se encontro ningun cluster EKS en la region $AWS_REGION"
            exit 1
          fi
          echo "EKS_CLUSTER_NAME=$CLUSTER" >> $GITHUB_ENV
          echo "  Cluster detectado: $CLUSTER"
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - name: Configurar kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          echo "  Contexto: $(kubectl config current-context)"
      - name: Aplicar manifests k8s
        run: |
          echo "  Aplicando namespace..."
          kubectl apply -f k8s/namespace.yaml
          echo "  Aplicando frontend-deployment..."
          kubectl apply -f k8s/frontend-deployment.yaml -n $K8S_NAMESPACE
          echo "  Aplicando frontend-service..."
          kubectl apply -f k8s/frontend-service.yaml -n $K8S_NAMESPACE
          echo "  Aplicando frontend-hpa..."
          kubectl apply -f k8s/frontend-hpa.yaml -n $K8S_NAMESPACE
          echo "  ✔ Manifests aplicados"
      - name: Forzar recreate de pods por probes nuevas
        run: |
          echo "  Eliminando pods antiguos para forzar recreate con probes actualizadas..."
          kubectl delete pod -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND} --grace-period=0 --force 2>/dev/null || true
          echo "  ✔ Pods eliminados, se recrearán automáticamente"
      - name: Actualizar imagen del deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
        run: |
          echo "  Actualizando deployment/${DEPLOYMENT_NAME}..."
          echo "  Usando tag: latest"
          kubectl set image deployment/${DEPLOYMENT_NAME} \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest \
            -n $K8S_NAMESPACE

          # Esperar hasta que el pod esté Ready (máx 10 min)
          echo "  Esperando a que el pod esté Ready (máx 10 min)..."
          END=$((SECONDS+600))
          READY=false
          while [ $SECONDS -lt $END ]; do
            # Obtener todos los pods y buscar uno que esté Running con 1/1
            ALL_PODS=$(kubectl get pods -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND} --no-headers 2>/dev/null)
            READY_POD=$(echo "$ALL_PODS" | grep -E "[0-9]+/[0-9]+\s+Running" | head -1)
            ERROR_POD=$(echo "$ALL_PODS" | grep -E "ImagePullBackOff|ErrImagePull|CrashLoopBackOff|Error" | head -1)

            echo "    Pods encontrados: $(echo "$ALL_PODS" | wc -l | tr -d ' '), Ready: $(echo "$ALL_PODS" | grep -cE "[0-9]+/[0-9]+\s+Running"), Errores: $(echo "$ALL_PODS" | grep -cE "Error|CrashLoop|ImagePull")"

            # Si al menos un pod está Running y Ready, consideramos éxito
            if [ -n "$READY_POD" ]; then
              echo "  ✅ Todos los pods Ready"
              READY=true
              break
            fi

            # Si hay pods con error y han pasado más de 30s, es un error real
            if [ -n "$ERROR_POD" ] && [ $SECONDS -gt 30 ]; then
              echo ""
              echo "═══════════════════════════════════════════════════════════"
              echo "  ⚠  Pod en estado de error después de 30s"
              echo "     Pod: $ERROR_POD"
              echo "     kubectl describe pod -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND}"
              echo "     kubectl logs -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND} --tail=30"
              echo "═══════════════════════════════════════════════════════════"
              exit 1
            fi
            sleep 10
          done
          if [ "$READY" = false ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════════"
            echo "  ⚠  El pod no estuvo Ready tras 10 minutos."
            echo "     kubectl describe pod -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND}"
            echo "     kubectl logs -n $K8S_NAMESPACE -l app=${ECR_REPO_FRONTEND} --tail=30"
            echo "═══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "  ✅ Pod Ready"
      - name: Verificar estado final
        run: |
          echo ""
          echo "========================================="
          echo " RESUMEN DEL DEPLOY"
          echo "========================================="
          echo ""
          echo "--- Pods ---"
          kubectl get pods -n $K8S_NAMESPACE -l app=alumnos-frontend
          echo ""
          echo "--- Services ---"
          kubectl get svc -n $K8S_NAMESPACE -l app=alumnos-frontend
          echo ""
          echo "--- HPA ---"
          kubectl get hpa alumnos-frontend-hpa -n $K8S_NAMESPACE 2>/dev/null || true
      - name: Obtener URL pública
        run: |
          URL=$(kubectl get svc alumnos-frontend -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -n "$URL" ]; then
            echo "URL pública: http://$URL"
            echo "URL_PUBLICA=http://$URL" >> $GITHUB_ENV
          fi
      - name: Resumen deploy
        if: success()
        run: |
          echo "### Deploy completado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** \`${{ env.EKS_CLUSTER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** \`${{ env.DEPLOYMENT_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** \`${{ env.K8S_NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión imagen:** \`${{ env.ECR_REPO_FRONTEND }}:${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL pública:** \${{ env.URL_PUBLICA }}" >> $GITHUB_STEP_SUMMARY
