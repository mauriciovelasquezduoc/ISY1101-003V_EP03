apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alumnos-backend-hpa
  namespace: alumnos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alumnos-backend
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70