name: CI/CD Backend — Gestor de Alumnos EKS
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
env:
  AWS_REGION: us-east-1
  ECR_REPO_BACKEND: alumnos-backend
  K8S_NAMESPACE: alumnos
  DEPLOYMENT_NAME: alumnos-backend
permissions:
  contents: write
jobs:
  # ============================================================
  # JOB 1: VERSIONING — calcula v1.x.0 y crea tag git
  # ============================================================
  versioning:
    name: Versionado Semántico (v1.x.0)
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW
  # ============================================================
  # JOB 2: BUILD & PUSH ECR — construye y publica la imagen
  # ============================================================
  build-push-ecr:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build y push con cache (con reintentos)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
        continue-on-error: true
      - name: Reintentar build si falló (1/2)
        if: steps.build-push-ecr.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
      - name: Verificar que build fue exitoso
        if: steps.build-push-ecr.outcome == 'failure'
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  ERROR: El build de la imagen falló incluso después del"
          echo "  reintento. Verifica la conexión a ECR y las credenciales"
          echo "  AWS en GitHub Secrets (pueden haber expirado)."
          echo "═══════════════════════════════════════════════════════════"
          exit 1
      - name: Resumen build
        run: |
          echo "### Imagen publicada en ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ steps.login-ecr.outputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Repositorio:** \`${{ env.ECR_REPO_BACKEND }}\`" >> $GITHUB_STEP_SUMMARY
  # ============================================================
  # JOB 3: DEPLOY A EKS — aplica manifiestos y actualiza imagen
  # ============================================================
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    needs: [versioning, build-push-ecr]
    steps:
      - uses: actions/checkout@v4
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2
      - name: Deducir variables de EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          CLUSTER=$(aws eks list-clusters --region "$AWS_REGION" --query 'clusters[0]' --output text)
          if [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ]; then
            echo "ERROR: No se encontro ningun cluster EKS en la region $AWS_REGION"
            exit 1
          fi
          echo "EKS_CLUSTER_NAME=$CLUSTER" >> $GITHUB_ENV
          echo "  Cluster detectado: $CLUSTER"
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - name: Configurar kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          echo "  Contexto: $(kubectl config current-context)"
      - name: Aplicar manifests k8s
        run: |
          echo "  Aplicando namespace..."
          kubectl apply -f k8s/namespace.yaml
          echo "  Aplicando backend-deployment..."
          kubectl apply -f k8s/backend-deployment.yaml -n $K8S_NAMESPACE
          echo "  Aplicando backend-service..."
          kubectl apply -f k8s/backend-service.yaml -n $K8S_NAMESPACE
          echo "  Aplicando backend-hpa..."
          kubectl apply -f k8s/backend-hpa.yaml -n $K8S_NAMESPACE
          echo "  ✔ Manifests aplicados"
      - name: Forzar recreate de pods por probes nuevas
        run: |
          echo "  Eliminando pods antiguos para forzar recreate con probes actualizadas..."
          kubectl delete pod -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND} --grace-period=0 --force 2>/dev/null || true
          echo "  ✔ Pods eliminados, se recrearán automáticamente"
      - name: Actualizar imagen del deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
        run: |
          echo "  Actualizando deployment/${DEPLOYMENT_NAME}..."
          echo "  Usando tag: latest"
          kubectl set image deployment/${DEPLOYMENT_NAME} \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:latest \
            -n $K8S_NAMESPACE

          # Esperar hasta que el pod esté Ready (máx 10 min)
          echo "  Esperando a que el pod esté Ready (máx 10 min)..."
          END=$((SECONDS+600))
          READY=false
          while [ $SECONDS -lt $END ]; do
            POD_INFO=$(kubectl get pods -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND} --no-headers 2>/dev/null | head -1)
            echo "    Pod status: ${POD_INFO:-sin pods aún}"
            if echo "$POD_INFO" | grep -qE "[0-9]+\/[0-9]+\s+Running"; then
              echo "  ✅ Todos los pods Ready"
              READY=true
              break
            fi
            POD_STATUS=$(echo "$POD_INFO" | awk '{print $3}')
            if echo "$POD_STATUS" | grep -qE "ImagePullBackOff|ErrImagePull|CrashLoopBackOff|Error"; then
              echo ""
              echo "═══════════════════════════════════════════════════════════"
              echo "  ⚠  El pod entro en estado: $POD_STATUS"
              echo "     kubectl describe pod -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND}"
              echo "     kubectl logs -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND} --tail=30"
              echo "═══════════════════════════════════════════════════════════"
              exit 1
            fi
            sleep 10
          done
          if [ "$READY" = false ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════════"
            echo "  ⚠  El pod no estuvo Ready tras 10 minutos."
            echo "     kubectl describe pod -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND}"
            echo "     kubectl logs -n $K8S_NAMESPACE -l app=${ECR_REPO_BACKEND} --tail=30"
            echo "═══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "  ✅ Pod Ready"
      - name: Verificar estado final
        run: |
          echo ""
          echo "========================================="
          echo " RESUMEN DEL DEPLOY"
          echo "========================================="
          echo ""
          echo "--- Pods ---"
          kubectl get pods -n $K8S_NAMESPACE -l app=alumnos-backend
          echo ""
          echo "--- Services ---"
          kubectl get svc -n $K8S_NAMESPACE -l app=alumnos-backend
          echo ""
          echo "--- HPA ---"
          kubectl get hpa -n $K8S_NAMESPACE -l app=alumnos-backend 2>/dev/null || echo "  (HPA sin label app, verificando por nombre)"
          kubectl get hpa alumnos-backend-hpa -n $K8S_NAMESPACE 2>/dev/null || true
      - name: Resumen deploy
        if: success()
        run: |
          echo "### Deploy completado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** \`${{ env.EKS_CLUSTER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** \`${{ env.DEPLOYMENT_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** \`${{ env.K8S_NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión imagen:** \`${{ env.ECR_REPO_BACKEND }}:${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
